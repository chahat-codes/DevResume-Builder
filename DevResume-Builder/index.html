<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevResume Builder | Generate Your Professional Resume</title>
    <meta name="description" content="A simple, powerful, and free resume builder for developers. Live preview, multiple themes, and PDF export.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Core Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Theme Styles -->
    <link rel="stylesheet" href="themes/classic.css">
    <link rel="stylesheet" href="themes/modern.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar with Form -->
        <aside class="sidebar">
            <header class="sidebar-header">
                <h1>DevResume <span style="color: #a0aec0; font-weight: 400;">Builder</span></h1>
                <div class="theme-switcher">
                    <button class="theme-btn active" id="btn-theme-classic" data-theme="classic">Classic</button>
                    <button class="theme-btn" id="btn-theme-modern" data-theme="modern">Modern</button>
                </div>
            </header>

            <main class="form-container">
                <!-- Personal Info -->
                <section class="form-group">
                    <label for="input-name">Full Name</label>
                    <input type="text" id="input-name" placeholder="John Doe">
                </section>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <section class="form-group">
                        <label for="input-email">Email Address</label>
                        <input type="email" id="input-email" placeholder="john@example.com">
                    </section>
                    <section class="form-group">
                        <label for="input-phone">Phone Number</label>
                        <input type="tel" id="input-phone" placeholder="+1 234 567 890">
                    </section>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <section class="form-group">
                        <label for="input-linkedin">LinkedIn URL</label>
                        <input type="text" id="input-linkedin" placeholder="linkedin.com/in/johndoe">
                    </section>
                    <section class="form-group">
                        <label for="input-github">GitHub Username</label>
                        <input type="text" id="input-github" placeholder="github.com/johndoe">
                    </section>
                </div>

                <section class="form-group">
                    <label for="input-bio">Short Bio / Summary</label>
                    <textarea id="input-bio" placeholder="Experienced full-stack developer with a passion for building scalable web applications..."></textarea>
                </section>

                <section class="form-group">
                    <label for="input-skills">Skills (Comma separated)</label>
                    <input type="text" id="input-skills" placeholder="JavaScript, React, Node.js, Python, AWS">
                </section>

                <!-- Dynamic Sections (Simplified for MVP) -->
                <section class="form-group">
                    <label for="input-experience">Work Experience (One per line: Title @ Company | Date | Desc)</label>
                    <textarea id="input-experience" placeholder="Senior Developer @ Google | 2020 - Present | Led the development of..."></textarea>
                </section>

                <section class="form-group">
                    <label for="input-education">Education (One per line: Degree @ Univ | Date)</label>
                    <textarea id="input-education" placeholder="B.S. Computer Science @ MIT | 2016 - 2020"></textarea>
                </section>
            </main>

            <footer class="controls">
                <button class="btn btn-secondary" id="btn-reset">Reset Data</button>
                <button class="btn btn-primary" id="btn-print">Download PDF</button>
            </footer>
        </aside>

        <!-- Preview Area -->
        <main class="preview-area">
            <div id="resume-preview" class="theme-classic">
                <!-- Content injected by JS -->
            </div>
        </main>
    </div>

    <!-- Script -->
    <script src="script.js"></script>
</body>
</html>
